<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jeanine</title>
    <meta name="description" content="De persoonlijke website van Jeanine." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />
    <style>
      :root {
        --bg: #0f0f17;
        --fg: #f5f3ff;
        --muted: #b5b1d6;
        --accent: #c4a6ff;
        --card: rgba(255, 255, 255, 0.04);
        --border: rgba(255, 255, 255, 0.08);
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: #faf8ff;
          --fg: #1a1330;
          --muted: #5b5577;
          --accent: #6b3fd6;
          --card: rgba(0, 0, 0, 0.03);
          --border: rgba(0, 0, 0, 0.08);
        }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 1.25rem;
        line-height: 1.6;
        background-image: radial-gradient(circle at 20% 0%, rgba(196, 166, 255, 0.18), transparent 45%),
                          radial-gradient(circle at 90% 100%, rgba(107, 63, 214, 0.15), transparent 50%);
      }
      main {
        max-width: 640px;
        width: 100%;
        text-align: center;
      }
      .badge {
        display: inline-block;
        font-size: 0.8rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.35rem 0.9rem;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: clamp(2.5rem, 7vw, 4rem);
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
      }
      p.lead {
        color: var(--muted);
        font-size: 1.1rem;
        margin: 0 auto 2rem;
        max-width: 38ch;
      }
      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
        margin-top: 1.5rem;
      }
      a.btn {
        display: inline-block;
        padding: 0.65rem 1.2rem;
        border-radius: 0.6rem;
        text-decoration: none;
        color: var(--fg);
        background: var(--card);
        border: 1px solid var(--border);
        transition: transform 0.15s ease, border-color 0.15s ease;
      }
      a.btn:hover, a.btn:focus-visible {
        transform: translateY(-1px);
        border-color: var(--accent);
        outline: none;
      }
      footer {
        margin-top: 3rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Welkom</span>
      <h1>Jeanine</h1>
      <p class="lead">Hier verschijnt binnenkort meer. De site is live en werkt &mdash; de inhoud volgt.</p>
      <div class="links">
        <a class="btn" href="mailto:hello@example.com">Contact</a>
      </div>
      <footer>&copy; <span id="year"></span> Jeanine</footer>
    </main>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
