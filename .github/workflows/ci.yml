name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Dummy values: env.ts validates these at import, but the build
      # never contacts Supabase (pages are dynamic / not prerendered).
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role
      ADMIN_ICS_TOKEN: ci-ics-token-0123456789
      ADMIN_NOTIFY_EMAIL: ci@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
